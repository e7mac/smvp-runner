name: Daily Content Pipeline (runner)

# PUBLIC runner for the private e7mac/social-media-video-pipeline repo.
# Public repos get unlimited free Actions minutes, so the heavy daily render
# runs here for $0. Each job checks out the private repo at runtime using a
# read-only fine-grained PAT (secret SMVP_REPO_PAT) and runs its scripts.
#
# Mirrors the private repo's daily-pipeline triggers so the drafts.e7mac.com
# buttons (render-latest with app/recipe, and the explorer's per-piece "render")
# dispatch THIS workflow. Keep the inputs in sync with the private repo.

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      app:
        description: App slug
        default: realeartrainer
      recipe:
        description: Recipe key
        default: chord_quiz
      piece:
        description: Corpus work id to render a single piece (whozart/stave) into drafts; blank = normal run
        default: ''
      purge_whozart:
        description: Purge existing whozart drafts before the batch render
        type: boolean
        default: false
      purge_stave:
        description: Purge existing stave/RSR drafts before the batch render
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smvp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smvp_test
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - run: pytest -v

  # --- DB-driven cron plan (Slice 5) -----------------------------------------
  # The scheduled batch set is no longer hardcoded here: this job checks out the
  # private repo and asks scripts/daily_plan.py which recipes/counts to render
  # today (from Neon recipe_config — editable in the drafts.e7mac.com Recipes
  # tab). Cron only; workflow_dispatch keeps its dedicated jobs below.
  plan:
    needs: test
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      count: ${{ steps.plan.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements.txt
      - name: Build daily render plan from DB config
        id: plan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/daily_plan.py --matrix > matrix.json
          cat matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
          echo "count=$(python -c 'import json,sys; print(len(json.load(open("matrix.json"))["include"]))')" >> "$GITHUB_OUTPUT"

  render-daily:
    needs: plan
    # Cron only; skip cleanly if the plan is empty (all recipes toggled off).
    if: ${{ github.event_name == 'schedule' && needs.plan.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - run: curl -fsSL https://deno.land/install.sh | sh
      - name: Render planned recipe
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORPUS_DATABASE_URL: ${{ secrets.CORPUS_DATABASE_URL }}
          MUSIC_AI_API_KEY: ${{ secrets.MUSIC_AI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          RET_AUDIO_SOURCE: itunes
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          app='${{ matrix.app }}'; recipe='${{ matrix.recipe }}'
          kind='${{ matrix.kind }}'; count='${{ matrix.count }}'
          echo "=== daily render: $app/$recipe ($kind, count=$count) ==="
          if [ "$kind" = "batch" ]; then
            python -m scripts.render_batch --app "$app" --recipe "$recipe" --n "$count"
          else
            python scripts/run_recipe.py --app "$app" --recipe "$recipe"
          fi

  render-batch:
    needs: test
    # Manual dispatch only: a targeted whozart refresh (purge then re-render).
    # The scheduled whozart batch now runs via plan + render-daily (DB-driven).
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.purge_whozart }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Purge + re-render whozart batch into drafts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORPUS_DATABASE_URL: ${{ secrets.CORPUS_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: >-
          python -m scripts.render_batch --app whozart --n 10
          --piano-only --famous-share 0.85
          ${{ (github.event_name == 'workflow_dispatch' && inputs.purge_whozart) && '--purge' || '' }}

  render-batch-stave:
    needs: test
    # Manual dispatch only: a targeted stave refresh (purge then re-render).
    # The scheduled stave batch now runs via plan + render-daily (DB-driven).
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.purge_stave }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Purge + re-render stave batch into drafts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORPUS_DATABASE_URL: ${{ secrets.CORPUS_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: >-
          python -m scripts.render_batch --app stave --n 10 --piano-only
          ${{ (github.event_name == 'workflow_dispatch' && inputs.purge_stave) && '--purge' || '' }}

  render-piece:
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.piece != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Render one piece into drafts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORPUS_DATABASE_URL: ${{ secrets.CORPUS_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: >-
          python -m scripts.render_batch
          --app "${{ inputs.app }}" --piece "${{ inputs.piece }}"

  render-and-notify:
    # On cron: wait for the DB-driven render-daily matrix, then digest+email.
    # On dispatch (no piece): render the single app/recipe, then digest+email.
    needs: [test, render-daily]
    if: ${{ always() && needs.test.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.piece == '') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - run: curl -fsSL https://deno.land/install.sh | sh
      - name: Run recipe
        # Dispatch only: the single app/recipe to (re)render on demand. The
        # scheduled set is rendered by plan + render-daily (DB-driven) above.
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORPUS_DATABASE_URL: ${{ secrets.CORPUS_DATABASE_URL }}
          MUSIC_AI_API_KEY: ${{ secrets.MUSIC_AI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          RET_AUDIO_SOURCE: itunes
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          if [ -n "${{ github.event.inputs.app }}" ]; then
            PAIRS="${{ github.event.inputs.app }}:${{ github.event.inputs.recipe }}"
          else
            PAIRS="realeartrainer:chord_quiz"
          fi
          rc=0
          for pair in $PAIRS; do
            app="${pair%%:*}"; recipe="${pair##*:}"
            echo "=== rendering $app/$recipe ==="
            python scripts/run_recipe.py --app "$app" --recipe "$recipe" || rc=1
          done
          exit $rc
      - name: Build digest
        id: digest
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/digest.py --out digest.html --subject-out subject.txt
          echo "subject=$(cat subject.txt)" >> "$GITHUB_OUTPUT"
      - name: Email digest
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER_ADDRESS }}
          server_port: ${{ secrets.SMTP_SERVER_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.digest.outputs.subject || '⚠️ Content pipeline FAILED (no digest)' }}"
          from: ${{ secrets.SMTP_FROM_ADDRESS }}
          to: 'mayank.ot@gmail.com'
          html_body: file://digest.html
