name: Collect Analytics (runner)

# Public runner — see daily-pipeline.yml.

on:
  schedule:
    - cron: "30 14 * * *"   # daily, after the morning posting window
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: e7mac/social-media-video-pipeline
          ref: main
          token: ${{ secrets.SMVP_REPO_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests "psycopg[binary]"
      - name: Collect channel analytics from Postiz
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
        run: python scripts/collect_analytics.py --days 30
